name: Release CLI

# Builds the agentsea CLI bundle and (re)publishes it as the `cli.js` asset on
# the rolling `cli-latest` GitHub Release. That asset is what `sh/cli/install.sh`
# downloads for `curl -fsSL .../install.sh | bash`, so it must stay in sync with
# the source. Requires the repo to be public (asset is fetched unauthenticated).

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - "packages/sdk/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/release-cli.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-cli
  cancel-in-progress: true

jobs:
  release-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: npm ci

      - name: Build CLI bundle
        run: npm run build:cli

      - name: Publish / refresh cli-latest asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view cli-latest >/dev/null 2>&1; then
            gh release upload cli-latest packages/cli/cli.js --clobber
          else
            gh release create cli-latest packages/cli/cli.js \
              --title "agentsea CLI (latest)" \
              --notes "Rolling latest agentsea CLI bundle (built from main). Consumed by sh/cli/install.sh."
          fi
